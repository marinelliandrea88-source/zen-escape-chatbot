<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Escape - Assistente</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .setup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .setup-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .setup-content h2 {
            margin-bottom: 20px;
            color: #2d5016;
            font-size: 24px;
        }

        .setup-content p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .setup-content input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .setup-content input:focus {
            outline: none;
            border-color: #2d5016;
            box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.1);
        }

        .setup-content button {
            background: #2d5016;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .setup-content button:hover {
            background: #4a7c3f;
        }

        .setup-content button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .setup-content .hint {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }

        .setup-content .hint a {
            color: #2d5016;
            text-decoration: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .header {
            background: linear-gradient(135deg, #2d5016 0%, #4a7c3f 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .language-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .lang-btn {
            padding: 5px 10px;
            border: 1.5px solid white;
            background: transparent;
            color: white;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: white;
            color: #2d5016;
        }

        .lang-btn:hover {
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.bot .message-bubble {
            background: #e8f0e6;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: #2d5016;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .thinking {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
        }

        .thinking span {
            width: 6px;
            height: 6px;
            background: #2d5016;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .thinking span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.4;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-6px);
            }
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #2d5016;
            box-shadow: 0 0 0 2px rgba(45, 80, 22, 0.1);
        }

        .input-area button {
            background: #2d5016;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
            flex-shrink: 0;
        }

        .input-area button:hover {
            background: #4a7c3f;
            transform: scale(1.05);
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: scale(1);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 18px;
            }

            .message-bubble {
                max-width: 90%;
            }

            .language-selector {
                gap: 6px;
            }

            .lang-btn {
                padding: 4px 8px;
                font-size: 10px;
            }

            .setup-content {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="setupModal" class="setup-modal">
        <div class="setup-content">
            <h2>🔑 Configura il Chatbot</h2>
            <p>Inserisci la tua API Key di Claude per abilitare risposte intelligenti.</p>
            <input
                type="password"
                id="apiKeyInput"
                placeholder="sk-ant-..."
                autocomplete="off"
            >
            <button id="setupBtn">Salva e Continua</button>
            <div class="hint">
                Non hai una API Key?
                <a href="https://console.anthropic.com/account/keys" target="_blank">Creane una gratis</a>
            </div>
        </div>
    </div>

    <div class="container hidden" id="chatContainer">
        <div class="header">
            <h1>🌿 Zen Escape</h1>
            <div class="language-selector">
                <button class="lang-btn active" data-lang="it">Italiano</button>
                <button class="lang-btn" data-lang="en">English</button>
                <button class="lang-btn" data-lang="fr">Français</button>
                <button class="lang-btn" data-lang="de">Deutsch</button>
            </div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Fai una domanda..."
                    autocomplete="off"
                >
                <button id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <script>
        const setupModal = document.getElementById('setupModal');
        const chatContainer = document.getElementById('chatContainer');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const setupBtn = document.getElementById('setupBtn');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const langBtns = document.querySelectorAll('.lang-btn');

        let currentLanguage = 'it';
        let isWaitingForResponse = false;
        let apiKey = localStorage.getItem('zenEscapeApiKey');

        // Setup
        if (!apiKey) {
            setupModal.classList.remove('hidden');
            setupBtn.addEventListener('click', () => {
                const key = apiKeyInput.value.trim();
                if (key && key.startsWith('sk-')) {
                    localStorage.setItem('zenEscapeApiKey', key);
                    apiKey = key;
                    setupModal.classList.add('hidden');
                    chatContainer.classList.remove('hidden');
                    init();
                } else {
                    alert('Inserisci una API Key valida (inizia con sk-)');
                }
            });
            apiKeyInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') setupBtn.click();
            });
        } else {
            setupModal.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            init();
        }

        const zenEscapeInfo = `
STRUTTURA E STANZE:
- Casa storica nel borgo medievale di Sillico, Garfagnana, risalente al 1670
- Piano terra: cucina completamente attrezzata + soggiorno con divano letto, tavolo e TV
- Primo piano: camera matrimoniale con scrivania, ampio armadio, balcone privato + bagno completo con doccia
- Interni minimalisti ed essenziali

CUCINA E COLAZIONE:
- Completamente attrezzata con pentole, stoviglie, olio, aceto, sale, pepe, peperoncino, curcuma
- Disponibili: thè, camomille, tisane, caffè in capsule/cialde/moka
- Elettrodomestici: bollitore, tostapane, microonde
- Primo giorno: già fornito latte, fette biscottate, marmellate, pane
- Non ci sono supermarket nelle immediate vicinanze

CHECK-IN E CHECK-OUT:
- Check-in: dalle 13:00 in poi
- Check-out: entro le 12:00
- Per esigenze particolari, contattare i proprietari - sono flessibili

PARCHEGGIO E ACCESSO:
- La proprietà NON è accessibile direttamente in auto (è dentro il borgo medievale)
- Due parcheggi disponibili nel paese: uno accanto al ristorante, uno al Belvedere
- Distanza: circa 200 metri (3 minuti a piedi) lungo un percorso panoramico

SPAZI ESTERNI:
- Ampi spazi verdi con gazebi, capanna per meditazione
- Aree panoramiche con viste sulle Alpi Apuane

SENTIERI E ATTIVITÀ:
- Sentiero Anello Breve Attorno a Sillico: Facile, 45min-1ora, paesaggio valle e Alpi
- Sentiero dei Castagneti: Facile, 1ora, castagneti e metati tradizionali
- Sentiero per Capraia: Media, 1,5-2ore, eremo di Capraia, viste spettacolari
- Sentiero per Bargecchia: Facile, 1-1,5ore, villaggio nel bosco
- Tutti i sentieri sono adatti ai cani

COSA FARE A SILLICO:
- Per scoprire attività, eventi e cosa fare: https://www.sillicodascoprire.it/
`;

        const greetings = {
            it: 'Ciao! 👋 Benvenuto a Zen Escape. Fai pure le tue domande sulla struttura, check-in/checkout, parcheggio, sentieri, o quello che vuoi sapere sul nostro rifugio.',
            en: 'Hi! 👋 Welcome to Zen Escape. Feel free to ask about the property, check-in/checkout, parking, trails, or anything else you\'d like to know.',
            fr: 'Bonjour! 👋 Bienvenue à Zen Escape. Posez vos questions sur la propriété, l\'arrivée/départ, le parking, les sentiers, ou toute autre information.',
            de: 'Hallo! 👋 Willkommen bei Zen Escape. Stellen Sie gerne Fragen zur Unterkunft, An-/Abreise, Parkplatz, Wanderwegen oder anderem.'
        };

        function init() {
            addMessage('bot', greetings[currentLanguage]);
        }

        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLanguage = btn.dataset.lang;
                userInput.placeholder = {
                    it: 'Fai una domanda...',
                    en: 'Ask a question...',
                    fr: 'Posez une question...',
                    de: 'Stellen Sie eine Frage...'
                }[currentLanguage];
                chatArea.innerHTML = '';
                init();
            });
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isWaitingForResponse) return;

            addMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;
            isWaitingForResponse = true;

            const thinkingId = addThinking();

            try {
                const prompt = `Sei l'assistente di Zen Escape, un B&B nel borgo medievale di Sillico in Garfagnana. Rispondi sempre in modo naturale, conversazionale e amichevole, come farebbe il proprietario.

INFORMAZIONI SULLA STRUTTURA:
${zenEscapeInfo}

La domanda dell'ospite è: "${message}"

Rispondi in ${getLanguageName(currentLanguage)}.
- Sii breve e diretto (massimo 3-4 frasi)
- Se la domanda riguarda sentieri, condividi i dettagli specifici
- Se riguarda attività a Sillico, consiglia https://www.sillicodascoprire.it/
- Usa un tono caldo e accogliente
- Non inventare informazioni non presenti`;

                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-20241022',
                        max_tokens: 500,
                        messages: [
                            { role: 'user', content: prompt }
                        ]
                    })
                });

                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Errore API');
                }

                const data = await response.json();
                const responseText = data.content[0].text;
                addMessage('bot', responseText);
            } catch (error) {
                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();
                addMessage('bot', '⚠️ Errore: ' + (error.message || 'Riprova'));
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                isWaitingForResponse = false;
                userInput.focus();
            }
        }

        function getLanguageName(lang) {
            return { it: 'italiano', en: 'inglese', fr: 'francese', de: 'tedesco' }[lang];
        }

        function addMessage(sender, text) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}`;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            messageEl.appendChild(bubble);
            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addThinking() {
            const id = 'thinking-' + Date.now();
            const messageEl = document.createElement('div');
            messageEl.id = id;
            messageEl.className = 'message bot';
            messageEl.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
            return id;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isWaitingForResponse) sendMessage();
        });
    </script>
</body>
</html>
