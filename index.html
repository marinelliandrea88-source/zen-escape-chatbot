<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Escape - Assistente</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .header {
            background: linear-gradient(135deg, #2d5016 0%, #4a7c3f 100%);
            color: white;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .language-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .lang-btn {
            padding: 5px 10px;
            border: 1.5px solid white;
            background: transparent;
            color: white;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: white;
            color: #2d5016;
        }

        .lang-btn:hover {
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: #e8f0e6;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: #2d5016;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .thinking {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
        }

        .thinking span {
            width: 6px;
            height: 6px;
            background: #2d5016;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .thinking span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.4;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-6px);
            }
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #2d5016;
            box-shadow: 0 0 0 2px rgba(45, 80, 22, 0.1);
        }

        .input-area button {
            background: #2d5016;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
            flex-shrink: 0;
        }

        .input-area button:hover {
            background: #4a7c3f;
            transform: scale(1.05);
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: scale(1);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 18px;
            }

            .message-bubble {
                max-width: 90%;
            }

            .language-selector {
                gap: 6px;
            }

            .lang-btn {
                padding: 4px 8px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Zen Escape</h1>
            <div class="language-selector">
                <button class="lang-btn active" data-lang="it">Italiano</button>
                <button class="lang-btn" data-lang="en">English</button>
                <button class="lang-btn" data-lang="fr">Français</button>
                <button class="lang-btn" data-lang="de">Deutsch</button>
            </div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Fai una domanda..."
                    autocomplete="off"
                >
                <button id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const langBtns = document.querySelectorAll('.lang-btn');

        let currentLanguage = 'it';
        let isWaitingForResponse = false;

        // Database di sentieri
        const sentieri = {
            it: [
                {
                    nome: "Anello Breve Attorno a Sillico",
                    difficolta: "Facile",
                    durata: "45 minuti - 1 ora",
                    descrizione: "Un breve anello attorno a Sillico con magnifiche vedute sulla valle e le Alpi Apuane. Attraversa castagneti e vigneti terrazzati.",
                    conCane: true,
                    dislivello: "Minimo"
                },
                {
                    nome: "Sentiero dei Castagneti",
                    difficolta: "Facile",
                    durata: "1 ora",
                    descrizione: "Un facile anello che parte dal parcheggio di Sillico, passa attraverso castagneti e vari 'metati' (edifici tradizionali per l'essicazione delle castagne). Ideale per una passeggiata tranquilla.",
                    conCane: true,
                    dislivello: "Minimo"
                },
                {
                    nome: "Sentiero per Capraia",
                    difficolta: "Media",
                    durata: "1,5 - 2 ore",
                    descrizione: "Questo sentiero raggiunge Capraia e la suggestiva Eremo di Capraia. Il percorso sale attraverso prati fino all'Eremo, che si trova in una posizione spettacolare.",
                    conCane: true,
                    dislivello: "Medio"
                },
                {
                    nome: "Sentiero per Bargecchia",
                    difficolta: "Facile",
                    durata: "1 ora - 1,5 ore",
                    descrizione: "Un sentiero verso Bargecchia, un piccolo villaggio che si affaccia sulla valle, completamente immerso nel bosco fino al villaggio.",
                    conCane: true,
                    dislivello: "Minimo-Medio"
                }
            ]
        };

        // Funzione per filtrare sentieri pertinenti
        function filterSentieri(queryText) {
            const lowerQuery = queryText.toLowerCase();
            const durata = sentieri.it.filter(s => {
                const isDurationMatch = lowerQuery.includes('ora') || lowerQuery.includes('1 ora') || lowerQuery.includes('minuto');
                const isDifficultyMatch = lowerQuery.includes('facile') || lowerQuery.includes('facili') || lowerQuery.includes('semplice');
                const isDog = lowerQuery.includes('cane') || lowerQuery.includes('cani');

                if (isDog && !s.conCane) return false;
                if (isDurationMatch || isDifficultyMatch || isDog) return true;
                return true; // Se non ci sono filtri specifici, mostra tutti
            });
            return durata.slice(0, 3); // Ritorna max 3 sentieri
        }

        // Formatta sentieri per il prompt
        function formatSentieri(sentieri) {
            return sentieri.map(s =>
                `• ${s.nome}\n  Difficoltà: ${s.difficolta} | Durata: ${s.durata}\n  ${s.descrizione}`
            ).join('\n\n');
        }

        const zenEscapeInfo = `
STRUTTURA E STANZE:
- Casa storica nel borgo medievale di Sillico, Garfagnana, risalente al 1670
- Piano terra: cucina completamente attrezzata + soggiorno con divano letto, tavolo e TV
- Primo piano: camera matrimoniale con scrivania, ampio armadio, balcone privato + bagno completo con doccia
- Interni minimalisti ed essenziali

CUCINA E COLAZIONE:
- Completamente attrezzata con pentole, stoviglie, olio, aceto, sale, pepe, peperoncino, curcuma
- Disponibili: thè, camomille, tisane, caffè in capsule/cialde/moka
- Elettrodomestici: bollitore, tostapane, microonde
- Primo giorno: già fornito latte, fette biscottate, marmellate, pane
- Non ci sono supermarket nelle immediate vicinanze, quindi tutto l'essenziale per il primo giorno è già in casa

CHECK-IN E CHECK-OUT:
- Check-in: dalle 13:00 in poi
- Check-out: entro le 12:00
- Per esigenze particolari, contattare i proprietari - sono flessibili

PARCHEGGIO E ACCESSO:
- La proprietà NON è accessibile direttamente in auto (è dentro il borgo medievale)
- Due parcheggi disponibili nel paese: uno accanto al ristorante all'arrivo, uno al Belvedere se il primo è pieno
- Distanza: circa 200 metri (3 minuti a piedi) da entrambi i parcheggi lungo un percorso panoramico

SPAZI ESTERNI:
- Ampi spazi verdi con gazebi
- Capanna per la meditazione
- Aree panoramiche con viste sulle Alpi Apuane
- Perfetto per leggere, meditare, riposare

ATTIVITÀ E NATURA:
- Ricca rete di sentieri nel bosco circostante
- Trekking di varie difficoltà
- Al tramonto: scenario mozzafiato con luci sulle montagne
- Sera: silenzio assoluto e profondo
- Circondato da verde autentico e incontaminato

IDEALE PER:
- Weekend di relax
- Soggiorni lunghi
- Detox digitale
- Chi vuole rallentare e respirare meglio
- Chi cerca pausa autentica in armonia con la natura

COSA FARE A SILLICO:
- Per scoprire attività, eventi e cosa fare a Sillico, visita: https://www.sillicodascoprire.it/
- Sillico è un borgomediaevale con ricchi sentieri, panorami, e cultura locale
`;

        const sillicoWebsiteUrl = 'https://www.sillicodascoprire.it/';

        const greetings = {
            it: 'Ciao! 👋 Benvenuto a Zen Escape. Fai pure le tue domande sulla struttura, check-in/checkout, parcheggio, o quello che vuoi sapere sul nostro rifugio.',
            en: 'Hi! 👋 Welcome to Zen Escape. Feel free to ask about the property, check-in/checkout, parking, or anything else you\'d like to know.',
            fr: 'Bonjour! 👋 Bienvenue à Zen Escape. N\'hésitez pas à poser vos questions sur la propriété, l\'arrivée/départ, le parking, ou toute autre information.',
            de: 'Hallo! 👋 Willkommen bei Zen Escape. Stellen Sie gerne Fragen zur Unterkunft, An-/Abreise, Parkplatz oder anderem.'
        };

        // Initialize
        function init() {
            addMessage('bot', greetings[currentLanguage]);
        }

        // Language switching
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLanguage = btn.dataset.lang;
                userInput.placeholder = {
                    it: 'Fai una domanda...',
                    en: 'Ask a question...',
                    fr: 'Posez une question...',
                    de: 'Stellen Sie eine Frage...'
                }[currentLanguage];
                chatArea.innerHTML = '';
                init();
            });
        });

        // Check if question is about trails/hiking
        function isAboutTrails(text) {
            const keywords = [
                'sentiero', 'sentieri', 'escursione', 'escursioni', 'trekking', 'cammino',
                'camminata', 'camminare', 'passeggiata', 'passeggiare', 'hiking', 'trail',
                'percorso', 'percorsi', 'cane', 'cani', 'gita', 'camminare con il cane',
                'passeggiata con il cane', 'ore', 'ora', 'durata', 'difficile', 'facile'
            ];
            const lowerText = text.toLowerCase();
            return keywords.some(keyword => lowerText.includes(keyword));
        }

        // Check if question is about activities in Sillico
        function isAboutActivities(text) {
            const keywords = [
                'fare', 'fare a sillico', 'cosa fare', 'attività', 'cose da fare',
                'visitare', 'tour', 'passare il tempo', 'intrattenimento',
                'divertimento', 'cosa c\'è', 'eventi', 'cosa vedi', 'come occupare',
                'sillico', 'borgomediaevale', 'visite', 'monumenti'
            ];
            const lowerText = text.toLowerCase();
            return keywords.some(keyword => lowerText.includes(keyword)) && !isAboutTrails(text);
        }

        // Send message
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isWaitingForResponse) return;

            addMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;
            isWaitingForResponse = true;

            // Show thinking indicator
            const thinkingId = addThinking();

            try {
                const isTrailQuestion = isAboutTrails(message);
                const isActivityQuestion = isAboutActivities(message);

                let promptExtra = '';

                if (isTrailQuestion) {
                    const relevantrails = filterSentieri(message);
                    const formattedTrails = formatSentieri(relevantrails);
                    promptExtra = `INFORMAZIONI SUI SENTIERI DI SILLICO:
Ecco i sentieri disponibili nella zona:

${formattedTrails}

La domanda dell'ospite è: "${message}"

Rispondi specificamente consigliando quale sentiero è più adatto in base alla domanda. Condividi direttamente i dettagli dei sentieri (nome, durata, difficoltà, descrizione).`;
                } else if (isActivityQuestion) {
                    promptExtra = `NOTA IMPORTANTE: Questa domanda riguarda attività e cose da fare a Sillico. Fornisci consigli generali sulla zona, ma consiglia di visitare ${sillicoWebsiteUrl} dove troveranno tutte le informazioni complete.`;
                }

                const prompt = `Sei l'assistente di Zen Escape, un B&B nel borgo medievale di Sillico in Garfagnana.

INFORMAZIONI SULLA STRUTTURA:
${zenEscapeInfo}

${promptExtra}

Rispondi in modo naturale, conversazionale e amichevole, come farebbe il proprietario del B&B.
- Se è una domanda sui sentieri, condividi direttamente i dettagli specifici (nome, durata, difficoltà)
- Sii breve e diretto, non verboso
- Se la domanda è articolata, rispondi specificamente a quello che chiede
- Usa un tono caldo e accogliente
- Non inventare informazioni non presenti

Rispondi in ${getLanguageName(currentLanguage)}.`;

                const response = await window.cowork.askClaude(prompt, []);

                // Remove thinking indicator
                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();

                // Handle different response formats
                let responseText = response;
                if (typeof response === 'object') {
                    responseText = response.text || response.content || response.response || JSON.stringify(response);
                }

                responseText = String(responseText);

                // Add link to Sillico website if it's an activity question
                if ((isActivityQuestion || isTrailQuestion) && !responseText.includes('sillicodascoprire')) {
                    responseText += `\n\n🔗 Per scoprire più sentieri e attività: ${sillicoWebsiteUrl}`;
                }

                addMessage('bot', responseText);
            } catch (error) {
                const thinkingEl = document.getElementById(thinkingId);
                if (thinkingEl) thinkingEl.remove();
                addMessage('bot', '⚠️ Errore nella risposta. Riprova.');
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                isWaitingForResponse = false;
                userInput.focus();
            }
        }

        function getLanguageName(lang) {
            return { it: 'italiano', en: 'inglese', fr: 'francese', de: 'tedesco' }[lang];
        }

        function addMessage(sender, text) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}`;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            messageEl.appendChild(bubble);
            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addThinking() {
            const id = 'thinking-' + Date.now();
            const messageEl = document.createElement('div');
            messageEl.id = id;
            messageEl.className = 'message bot';
            messageEl.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
            return id;
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isWaitingForResponse) sendMessage();
        });

        init();
    </script>
</body>
</html>
